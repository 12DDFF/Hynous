# Hynous Configuration
# Edit this file to change behavior. Restart app after changes.

# Application metadata
app:
  name: "Hynous"
  version: "0.1.0"

# Execution settings
execution:
  mode: "paper"              # paper | testnet | live_confirm | live_auto
  paper_balance: 1000        # Starting balance for paper trading (USD)
  symbols:                   # Symbols to track
    - "BTC"
    - "ETH"
    - "SOL"

# Hyperliquid exchange settings
hyperliquid:
  default_leverage: 10         # Minimum 10x, always set per-trade
  max_position_usd: 10000     # Safety cap per position on testnet
  default_slippage: 0.05       # 5% slippage tolerance for market orders

# Agent settings
agent:
  model: "openrouter/x-ai/grok-4.1-fast"  # OpenRouter: 1 key, all models — runtime override via storage/model_prefs.json
  max_tokens: 2048           # Max response tokens (user chat default)
  temperature: 0.7           # Creativity (0-1)

# Coinglass settings (cross-exchange derivatives data)
coinglass:
  plan: "hobbyist"             # hobbyist | analyst | professional

# Daemon settings (background autonomous agent)
daemon:
  enabled: false                   # Master switch — enable autonomous mode
  price_poll_interval: 60          # Price polling from Hyperliquid (seconds)
  deriv_poll_interval: 300         # Derivatives/sentiment polling (seconds)
  periodic_interval: 3600          # Periodic market review wake (seconds, 60 min)
  curiosity_threshold: 1           # Pending curiosity items before learning session
  curiosity_check_interval: 900    # Curiosity queue check interval (seconds, 15 min)
  decay_interval: 21600              # FSRS batch decay cycle interval (seconds, 6 hours)
  conflict_check_interval: 1800      # Contradiction queue polling interval (seconds, 30 min)
  health_check_interval: 3600        # Daemon health check interval (seconds)
  embedding_backfill_interval: 43200 # Embedding backfill interval (seconds, 12 hours)
  consolidation_interval: 86400      # Cross-episode generalization (seconds, 24 hours)
  max_daily_loss_usd: 100            # Circuit breaker: pause trading after this daily loss
  max_open_positions: 3              # Max simultaneous open positions
  max_wakes_per_hour: 4              # Was 6 — fewer wakes, higher quality
  wake_cooldown_seconds: 120         # Min seconds between non-priority wakes
  playbook_cache_ttl: 1800           # Playbook matcher cache refresh interval (seconds, 30 min)
  # Peak profit protection
  breakeven_stop_enabled: true
  breakeven_buffer_micro_pct: 0.07   # Price % buffer for breakeven stop (matches round-trip fee)
  breakeven_buffer_macro_pct: 0.07   # Same for macro trades
  dynamic_sl_enabled: true           # Vol-regime protective SL at entry
  # Trailing stop (mechanical exit — no agent involvement)
  trailing_stop_enabled: true          # Master switch
  trailing_activation_roe: 2.8         # ROE % to activate trailing
  trailing_retracement_pct: 50.0       # % of peak ROE to give back before exit
  # ML-adaptive trailing stop parameters
  # Vol-regime activation thresholds (ROE % — lower = activates earlier)
  trail_activation_extreme: 1.5
  trail_activation_high: 2.0
  trail_activation_normal: 2.5
  trail_activation_low: 3.0
  # Continuous exponential retracement: r(p) = floor + amplitude * exp(-k * p)
  # Replaces 3-tier + vol-modifier system. k varies by vol regime.
  trail_ret_floor: 0.20
  trail_ret_amplitude: 0.30
  trail_ret_k_extreme: 0.160
  trail_ret_k_high: 0.100
  trail_ret_k_normal: 0.080
  trail_ret_k_low: 0.040
  # Minimum trail distance above fee-BE (ROE %)
  trail_min_distance_above_fee_be: 0.5
  # Agent cannot close positions during autonomous daemon wakes.
  # User-initiated closes (chat, Discord) always allowed.
  autonomous_close_lockout: true
  # Candle-based peak tracking (enhances MFE/MAE for trailing stop accuracy)
  candle_peak_tracking_enabled: true
  # WebSocket price feed (sub-second prices for mechanical exits)
  ws_price_feed: true                 # allMids WS feed for _fast_trigger_check
  # Satellite labeling (outcome labels for ML validation)
  labeler_interval: 3600              # Snapshot outcome labeling interval (seconds, 1 hour)
  labeler_batch_size: 50              # Max snapshots per coin per run (rate limit protection)
  # Condition model validation (automated live accuracy checks)
  validation_interval: 86400          # Live validation interval (seconds, 24 hours)
  validation_days: 7                  # Days of data to validate against
  # Composite entry score thresholds
  composite_reject_score: 25
  composite_warn_score: 45

# Market scanner (anomaly detection across ALL Hyperliquid pairs)
scanner:
  enabled: true
  wake_threshold: 0.7              # Min severity to wake agent (was 0.6 — too much noise)
  max_anomalies_per_wake: 5
  dedup_ttl_minutes: 45                # Was 30 — give market more time to develop
  price_spike_5min_pct: 3.0        # % move in 5min to flag
  price_spike_15min_pct: 5.0       # % move in 15min to flag
  funding_extreme_percentile: 95   # Percentile cutoff for funding extremes
  oi_surge_pct: 10.0               # % OI change in 5min to flag
  liq_cascade_min_usd: 5000000     # Per-coin 1h liquidation threshold
  liq_wave_min_usd: 50000000       # Market-wide 1h liquidation threshold
  min_oi_usd: 1000000              # Skip pairs with OI below this
  # Micro trading detectors (L2 + 5m candles)
  book_poll_enabled: true            # Fetch L2 orderbooks + 5m candles for tracked symbols
  book_imbalance_flip_pct: 15.0      # Imbalance swing % to trigger book_flip detector
  momentum_5m_pct: 1.5               # 5m candle body % to trigger momentum_burst
  momentum_volume_mult: 2.0          # Volume multiplier vs rolling avg for momentum
  position_adverse_threshold: 0.40   # Imbalance threshold for adverse book signal

# Data layer (hynous-data service)
data_layer:
  url: "http://127.0.0.1:8100"    # hynous-data REST API
  enabled: true                     # Use data layer signals in briefing/scanner
  timeout: 5                        # HTTP timeout seconds

# ML Satellite — feature engine + inference (SPEC-02/03)
satellite:
  enabled: true                        # Disabled during UI dev — enable when daemon runs stably
  db_path: "storage/satellite.db"       # Satellite SQLite database
  data_layer_db_path: "data-layer/storage/hynous-data.db"  # Read-only access to data-layer for historical queries
  snapshot_interval: 300                 # Feature snapshot frequency (matches deriv_poll_interval)
  coins:                                 # Coins to compute features for
    - "BTC"
    - "ETH"
    - "SOL"
  min_position_size_usd: 1000           # Noise filter for heatmap positions
  liq_cascade_threshold: 2.5            # Liquidation intensity ratio threshold
  liq_cascade_min_usd: 500000           # Min USD for cascade detection
  store_raw_data: true                   # Store raw API responses for retroactive debugging
  funding_settlement_hours:              # Hyperliquid funding settlement times (UTC)
    - 0
    - 8
    - 16
  # Inference (SPEC-05)
  inference_entry_threshold: 3.0
  inference_conflict_margin: 1.0
  inference_shadow_mode: true

# Event detection thresholds
events:
  funding:
    extreme_positive: 0.001  # 0.10%
    extreme_negative: -0.0005  # -0.05%
  price:
    spike_percent: 0.05      # 5% move triggers event
  cooldown_minutes: 30       # Min time between same event type

# Data-layer: L2 orderbook WebSocket subscriber
l2_subscriber:
  enabled: true
  coins:
    - "BTC"

# Data-layer: Tick-level microstructure feature collector (writes to satellite.db)
tick_collector:
  enabled: true
  coins:
    - "BTC"
  satellite_db_path: "storage/satellite.db"

# Logging
logging:
  level: "INFO"              # DEBUG | INFO | WARNING | ERROR
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# ============================================================================
# v2 configuration
# These sections are only consumed by v2 branch code. They are ignored by
# v1 code. Do not remove or modify without approval from v2 plan.
# ============================================================================
v2:
  enabled: true  # Master switch for v2 features (must be true on v2 branch)

  # Journal module (phase 2)
  journal:
    db_path: "storage/v2/journal.db"
    embeddings_model: "openai/text-embedding-3-small"
    embeddings_dim: 1536
    comparison_dim: 512  # matryoshka truncation for fast similarity
    wal_mode: true
    busy_timeout_ms: 5000

  # Analysis agent (phase 3)
  analysis_agent:
    model: "anthropic/claude-sonnet-4.5"
    max_tokens: 4096
    temperature: 0.2
    retry_on_failure: false  # one-shot; manual re-analyze button available
    batch_rejection_interval_s: 3600  # hourly batch analysis of rejected signals
    timeout_s: 60
    prompt_version: "v1"  # bump when prompt changes

  # Mechanical entry (phase 5)
  mechanical_entry:
    trigger_source: "ml_signal_driven"  # or "hybrid_scanner_ml" when implemented
    composite_entry_threshold: 50       # minimum composite score to trigger entry
    direction_confidence_threshold: 0.55 # minimum direction model confidence
    require_entry_quality_pctl: 60       # minimum entry quality percentile
    max_vol_regime: "high"               # reject if vol is extreme
    roe_target_pct: 10.0                 # fixed TP target as ROE %
    coin: "BTC"                          # single coin for phase 1

  # Consolidation (phase 6)
  consolidation:
    edges_enabled: true
    edge_types: ["preceded_by", "followed_by", "same_regime_bucket", "same_rejection_reason", "rejection_vs_contemporaneous_trade"]
    pattern_rollup_enabled: true
    pattern_rollup_interval_hours: 168  # weekly
    pattern_rollup_window_days: 30

  # User chat (simplified journal query interface — phase 5 M6)
  user_chat:
    enabled: true
    model: "anthropic/claude-opus-4"
    max_tokens: 4096
    temperature: 0.2
    tool_timeout_s: 30

  # Kronos foundation-model shadow predictor (post-v2 experiment).
  # Runs alongside the live trigger, writes would-fire verdicts to
  # kronos_shadow_predictions. Zero live-trading impact.
  # See v2-planning/12-kronos-shadow-integration.md.
  kronos_shadow:
    enabled: false
    symbol: "BTC"
    # Largest open-source Kronos variant (102.3M params).
    # Kronos-large (499M) weights are NOT publicly released by upstream.
    model_name: "NeoQuasar/Kronos-base"
    tokenizer_name: "NeoQuasar/Kronos-Tokenizer-base"
    max_context: 512
    lookback_bars: 360
    pred_len: 24
    sample_count: 5  # Kronos-base @ 102M params is CPU-bound; 20 overflows the 300s cadence. 5 keeps inference ~70-90s.
    temperature: 1.0
    top_p: 0.9
    tick_interval_s: 300
    long_threshold: 0.60
    short_threshold: 0.40
